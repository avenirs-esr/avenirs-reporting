name: Generate Milestone Report

permissions:
  contents: write

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Auth gh
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Debug script content
        run: |
            echo "---- SCRIPT ----"
            cat -n scripts/generate-report.sh
            echo "---------------"

      - name: Fetch GitHub project data 
        run: | 
          ISSUES_JSON="$( gh api graphql --paginate \ -f owner="avenirs-esr" \ -f repo="avenirs-reporting" \ -f query=' query($owner: String!, $repo: String!, $endCursor: String) { repository(owner: $owner, name: $repo) { issues(first: 100, after: $endCursor, orderBy: {field: CREATED_AT, direction: ASC}) { nodes { number title url state issueType { name } milestone { title } } pageInfo { hasNextPage endCursor } } } }' \ | jq -s '[.[].data.repository.issues.nodes[]]' )" echo "$ISSUES_JSON" > issues.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Export issues JSON 
        run: | 
          echo "ISSUES_JSON=$(cat issues.json | jq -c .)" >> $GITHUB_ENV

      - name: Generate report
        run: |
          sed -i 's/\r$//' scripts/generate-report.sh
          chmod +x scripts/generate-report.sh
          ./scripts/generate-report.sh

      - name: Commit report
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add user-stories/
          git commit -m "Update report $(date +%F)" || echo "No changes"
          git push
